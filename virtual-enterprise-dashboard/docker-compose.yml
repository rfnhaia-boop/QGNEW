# ============================================
# NEW HOLDING — Docker Compose
# ============================================
version: '3.8'

services:
  new-holding:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GOOGLE_AI_API_KEY: ${GOOGLE_AI_API_KEY}
    container_name: new-holding-office
    restart: always
    ports:
      - "3000:3000"
    environment:
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY}
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
